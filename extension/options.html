<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VisionClip Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <header>
      <h1>VisionClip</h1>
      <p>OpenAI APIキーをMacのKeychainに保存します。Chrome拡張には保存しません。</p>
    </header>
    <section>
      <label for="api-key">OpenAI APIキー</label>
      <div class="input-row">
        <input id="api-key" type="password" autocomplete="off" spellcheck="false" placeholder="sk-...">
        <button id="toggle" type="button">表示</button>
      </div>
      <div class="actions">
        <button id="save" type="button" class="primary">Keychainに保存</button>
        <button id="check" type="button">状態を確認</button>
      </div>
      <p id="message" class="message">APIキーは保存時だけMac側ホストへ渡されます。</p>
    </section>
    <section>
      <label for="model">OCRモデル</label>
      <select id="model">
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        <option value="gpt-5.4-nano">gpt-5.4-nano</option>
        <option value="gpt-5.4-mini">gpt-5.4-mini</option>
      </select>
      <div class="actions">
        <button id="save-model" type="button" class="primary">モデルを保存</button>
      </div>
      <p id="model-message" class="message">保存したモデルは右クリックOCRと範囲OCRで使われます。</p>
    </section>
  </main>
  <script src="options.js"></script>
</body>
</html>
