<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VisionClip</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>VisionClip</h1>
        <p>Image OCR to Clipboard</p>
      </div>
      <div class="header-actions">
        <button id="settings" type="button">設定</button>
        <button id="refresh" type="button">更新</button>
      </div>
    </header>
    <section class="quick-actions">
      <button id="region-capture" type="button" class="primary-action">範囲OCR</button>
    </section>
    <section class="status-card">
      <div class="row"><span>APIキー</span><strong id="key-status">確認中...</strong></div>
      <div class="row"><span>モデル</span><strong id="model-status">確認中...</strong></div>
      <div class="row"><span>状態</span><strong id="run-status">確認中...</strong></div>
      <p id="status-message" class="message"></p>
    </section>
    <section>
      <div class="section-title-row">
        <h2>最近5件</h2>
        <button id="clear-history" type="button" class="subtle-button">履歴削除</button>
      </div>
      <p id="history-note" class="history-note"></p>
      <div id="history" class="history"></div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
