<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VisionClip OCR Samples</title>
  <link rel="stylesheet" href="samples.css">
</head>
<body>
  <main>
    <header>
      <h1>VisionClip OCR Samples</h1>
      <p>日本語と英語が混ざったOCR確認用画像</p>
    </header>
    <section class="sample-grid" aria-label="OCR sample images">
      <article>
        <img src="samples/ocr-sample-01-dashboard.png" alt="UI dashboard OCR sample">
        <div>
          <h2>UI / Dashboard</h2>
          <p>表、状態カード、小さめのUIテキスト</p>
        </div>
      </article>
      <article>
        <img src="samples/ocr-sample-02-receipts-labels.png" alt="Receipt and shipping label OCR sample">
        <div>
          <h2>Receipt / Label</h2>
          <p>金額、配送ラベル、注意書き、ID</p>
        </div>
      </article>
      <article>
        <img src="samples/ocr-sample-03-whiteboard-notes.png" alt="Whiteboard and sticky notes OCR sample">
        <div>
          <h2>Whiteboard / Notes</h2>
          <p>付箋、手書き風、低コントラスト</p>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
