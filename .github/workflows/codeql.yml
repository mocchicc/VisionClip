name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 18 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: swift

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Build Swift native host
        if: matrix.language == 'swift'
        run: |
          swift build \
            -c release \
            --package-path native-host \
            --build-path "$RUNNER_TEMP/visionclip-codeql-build"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
