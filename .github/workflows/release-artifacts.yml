name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release-artifacts:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/check_release_tag.js "${GITHUB_REF_NAME}"

      - name: Run checks
        run: ./scripts/check.sh

      - name: Build release artifacts
        run: ./scripts/package_release.sh

      - name: Verify release artifacts
        run: node scripts/check_release_package.js

      - name: Smoke test release installer
        run: ./scripts/check_release_install.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visionclip-release-${{ github.run_number }}
          path: |
            dist/*.zip
            dist/checksums-*.txt
          if-no-files-found: error
          retention-days: 30
