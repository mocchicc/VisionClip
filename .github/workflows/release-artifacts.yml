name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-artifacts:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/check_release_tag.js "${GITHUB_REF_NAME}"

      - name: Run checks
        run: ./scripts/check.sh

      - name: Build release artifacts
        run: ./scripts/package_release.sh

      - name: Verify release artifacts
        run: node scripts/check_release_package.js

      - name: Smoke test native host pkg
        run: ./scripts/check_native_host_pkg.sh

      - name: Smoke test release installer
        run: ./scripts/check_release_install.sh

      - name: Generate release QA report
        run: node scripts/generate_release_qa_report.js

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NOTES="docs/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [[ ! -f "$RELEASE_NOTES" ]]; then
            echo "Missing release notes: $RELEASE_NOTES" >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.zip dist/*.pkg dist/checksums-*.txt dist/release-qa-*.md --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.pkg dist/checksums-*.txt dist/release-qa-*.md \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$RELEASE_NOTES" \
              --verify-tag
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visionclip-release-${{ github.run_number }}
          path: |
            dist/*.zip
            dist/*.pkg
            dist/checksums-*.txt
            dist/release-qa-*.md
          if-no-files-found: error
          retention-days: 30
